<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>hoi4-clone 战斗观察器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
  h1 { color: #e94560; margin-bottom: 12px; font-size: 20px; }
  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1200px; margin: 0 auto; }
  .panel { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 14px; }
  .panel h2 { color: #e94560; font-size: 15px; margin-bottom: 10px; border-bottom: 1px solid #0f3460; padding-bottom: 6px; }
  textarea { width: 100%; height: 180px; background: #0a0a1a; color: #7ec8e3; border: 1px solid #0f3460; border-radius: 4px; padding: 8px; font-family: Consolas, monospace; font-size: 12px; resize: vertical; }
  .controls { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
  button { background: #e94560; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
  button:hover { background: #c81e45; }
  button:disabled { background: #555; cursor: not-allowed; }
  button.secondary { background: #0f3460; }
  button.secondary:hover { background: #1a4a80; }
  .status-bar { font-size: 12px; color: #7ec8e3; margin: 8px 0; }
  .divisions { display: flex; flex-direction: column; gap: 10px; }
  #mapCanvas { width: 100%; height: 280px; background: #0a0a1a; border: 1px solid #0f3460; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
  .map-hint { font-size: 11px; color: #888; margin-bottom: 8px; }
  .div-card { background: #0a0a1a; border-left: 4px solid #0f3460; border-radius: 4px; padding: 10px; }
  .div-card.attacker { border-left-color: #e94560; }
  .div-card.defender { border-left-color: #16c79a; }
  .div-card.broken { opacity: 0.5; }
  .div-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .div-owner { font-weight: bold; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 11px; }
  .bar-label { width: 32px; color: #aaa; }
  .bar-track { flex: 1; height: 14px; background: #1a1a2e; border-radius: 7px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.3s; }
  .bar-fill.org { background: linear-gradient(90deg, #16c79a, #4cd964); }
  .bar-fill.str { background: linear-gradient(90deg, #e94560, #ff6b6b); }
  .bar-fill.eq { background: linear-gradient(90deg, #f0a500, #ffd700); }
  .bar-fill.mp { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }
  .div-status { font-size: 11px; color: #aaa; }
  .div-card.broken .div-status { color: #e94560; }
  .bar-val { width: 50px; text-align: right; color: #ccc; font-family: monospace; }
  .battle-info { font-size: 12px; color: #aaa; margin-top: 8px; }
  #log { height: 100px; overflow-y: auto; background: #0a0a1a; border: 1px solid #0f3460; border-radius: 4px; padding: 6px; font-family: monospace; font-size: 11px; color: #7ec8e3; margin-top: 10px; }
  .loading { color: #e94560; text-align: center; padding: 40px; font-size: 16px; }
</style>
</head>
<body>
<h1>⚔️ hoi4-clone 战斗观察器</h1>
<div class="status-bar" id="loadStatus">正在加载 WASM 引擎...</div>

<div class="layout" id="app" style="display:none">
  <div class="panel">
    <h2>📋 场景设置 (HOI4 风格脚本)</h2>
    <textarea id="script">create_province = { id = 1 owner = FRA neighbors = { 2 3 } }
create_province = { id = 2 owner = GER neighbors = { 1 } }
create_province = { id = 3 owner = FRA neighbors = { 1 } }
add_equipment = { owner = GER type = medium_tank amount = 700 }
add_equipment = { owner = FRA type = infantry_equipment amount = 700 }
add_manpower = { owner = GER amount = 10000 }
add_manpower = { owner = FRA amount = 10000 }
create_division = { owner = GER location = 1 equipment = medium_tank battalions = 7 }
create_division = { owner = FRA location = 1 equipment = infantry_equipment battalions = 7 }
start_battle = { attacker = GER defender = FRA province = 1 }
# 正常: FRA org先归零→撤退到省3(🚩📍1→3)
# 想看歼灭: 把省3的owner改成GER(包围), FRA无路可退→💀</textarea>
    <div class="controls">
      <button onclick="loadScript()">应用场景</button>
      <button class="secondary" onclick="tick(1)">▶ 推进1小时</button>
      <button class="secondary" onclick="tick(24)">⏩ 推进1天</button>
      <button class="secondary" onclick="autoRun()">⏭ 自动战斗</button>
      <button class="secondary" onclick="reset()">↺ 重置</button>
    </div>
    <div class="status-bar" id="hourDisplay">游戏时间: 第 0 小时</div>
    <div id="log"></div>
  </div>

  <div class="panel">
    <h2>🪖 战场态势</h2>
    <canvas id="mapCanvas"></canvas>
    <div class="map-hint">💡 点师卡片选中 → 点目标省移动(红箭头=进攻, 绿=移动) | 直接点省切换控制权(包围)</div>
    <div class="battle-info" id="battleInfo"></div>
    <div class="divisions" id="divisions"></div>
  </div>
</div>

<script>
let wasm = null;
let autoTimer = null;

// WASM 内存读取: 把 Rust 返回的 null-terminated C 字符串读成 JS string
function readCString(ptr) {
  const mem = new Uint8Array(wasm.exports.memory.buffer);
  let end = ptr;
  while (mem[end] !== 0) end++;
  return new TextDecoder('utf-8').decode(mem.subarray(ptr, end));
}

// 传 JS string 给 Rust: 编码后写入 wasm 内存, 返回 {ptr, len}
function passStr(str) {
  const bytes = new TextEncoder().encode(str);
  const ptr = wasm.exports.engine_alloc(bytes.length);
  const mem = new Uint8Array(wasm.exports.memory.buffer);
  mem.set(bytes, ptr);
  return { ptr, len: bytes.length };
}

async function loadWasm() {
  const resp = await fetch('hoi4_clone.wasm?v=' + Date.now());
  const bytes = await resp.arrayBuffer();
  const result = await WebAssembly.instantiate(bytes, { env: {} });
  wasm = result.instance;
  document.getElementById('loadStatus').textContent = '✓ WASM 引擎加载完成 (178KB)';
  document.getElementById('app').style.display = 'grid';
  loadScript();
}

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

function loadScript() {
  const script = document.getElementById('script').value;
  const { ptr, len } = passStr(script);
  // 设置玩家国家为 GER(简化: demo 固定)
  const player = passStr('GER');
  wasm.exports.engine_set_player(player.ptr, player.len);
  const rc = wasm.exports.engine_run_setup(ptr, len);
  if (rc !== 0) {
    log('⚠️ 脚本错误, code=' + rc);
  } else {
    log('✓ 场景已加载');
  }
  refresh();
}

function tick(hours) {
  wasm.exports.engine_tick(hours);
  refresh();
}

function autoRun() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; log('⏸ 暂停'); return; }
  autoTimer = setInterval(() => {
    tick(1);
    const state = getState();
    const allBroken = state.divisions.every(d => d.broken || d.owner !== state.player);
    if (allBroken) { clearInterval(autoTimer); autoTimer = null; log('🏁 战斗结束'); }
  }, 200);
  log('▶ 自动战斗中...');
}

function reset() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  wasm.exports.engine_reset();
  document.getElementById('log').innerHTML = '';
  log('↺ 已重置');
  loadScript();
}

function getState() {
  const ptr = wasm.exports.engine_get_state();
  const json = readCString(ptr);
  return JSON.parse(json);
}

function refresh() {
  const state = getState();
  document.getElementById('hourDisplay').textContent = `游戏时间: 第 ${state.hour} 小时`;
  document.getElementById('battleInfo').textContent = `活跃战斗: ${state.battles} 场`;

  const container = document.getElementById('divisions');
  container.innerHTML = '';
  for (const d of state.divisions) {
    const card = document.createElement('div');
    let status;
    if (d.annihilated) status = '💀 歼灭';
    else if (d.attacking) status = '⚔️ 进攻→' + d.dest;
    else if (d.dest) status = '🚩 撤退→' + d.dest;
    else if (d.retreating) status = '🔄 恢复中';
    else if (d.org <= 0) status = '⚠️ 破阵';
    else status = '🛡️ 驻扎';
    card.dataset.divId = d.id;
    if (d.id === selectedDivId) card.style.outline = '2px solid #ffd700';
    card.onclick = () => {
      selectedDivId = (selectedDivId === d.id) ? null : d.id;
      log(selectedDivId ? `选中师#${d.id}, 点目标省下移动令` : '取消选中');
      refresh();
    };
    card.className = 'div-card ' + (d.owner === 'GER' ? 'attacker' : 'defender') + (d.annihilated || d.retreating ? ' broken' : '');
    const orgPct = d.max_org > 0 ? (d.org / d.max_org * 100) : 0;
    const strPct = d.max_str > 0 ? (d.str / d.max_str * 100) : 0;
    const eqPct = (d.eq_ratio || 1) * 100;
    const mpPct = (d.mp_ratio || 1) * 100;
    card.innerHTML = `
      <div class="div-head">
        <span class="div-owner">${d.owner} 师 #${d.id} 📍${d.loc}${d.dest ? '→'+d.dest : ''}</span>
        <span class="div-status">${status}</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">组织</span>
        <div class="bar-track"><div class="bar-fill org" style="width:${orgPct}%"></div></div>
        <span class="bar-val">${d.org.toFixed(1)}/${d.max_org.toFixed(0)}</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">HP</span>
        <div class="bar-track"><div class="bar-fill str" style="width:${strPct}%"></div></div>
        <span class="bar-val">${d.str.toFixed(1)}/${d.max_str.toFixed(0)}</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">装备</span>
        <div class="bar-track"><div class="bar-fill eq" style="width:${eqPct}%"></div></div>
        <span class="bar-val">${eqPct.toFixed(0)}%</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">人力</span>
        <div class="bar-track"><div class="bar-fill mp" style="width:${mpPct}%"></div></div>
        <span class="bar-val">${mpPct.toFixed(0)}%</span>
      </div>`;
    container.appendChild(card);
  }
  drawMap();
}

// === 节点图 Canvas ===
const TAG_COLORS = { GER: '#e94560', FRA: '#16c79a' };
let canvas, ctx;
let selectedDivId = null; // 选中师(点师卡片选中, 再点省下移动令)

function provincePos(id, allIds, w, h) {
  // 省份环形排布; 省1居中(战场)
  if (id === 1) return { x: w / 2, y: h / 2 };
  const idx = allIds.indexOf(id);
  const others = allIds.filter(x => x !== 1);
  const oi = others.indexOf(id);
  const n = others.length;
  const r = Math.min(w, h) * 0.35;
  const angle = (oi / Math.max(n, 1)) * Math.PI * 2 - Math.PI / 2;
  return { x: w / 2 + Math.cos(angle) * r, y: h / 2 + Math.sin(angle) * r };
}

function drawMap() {
  canvas = document.getElementById('mapCanvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const state = getState();
  if (!state.provinces || state.provinces.length === 0) return;
  const ids = state.provinces.map(p => p.id);
  const pos = {};
  state.provinces.forEach(p => { pos[p.id] = provincePos(p.id, ids, W, H); });

  // 邻接连线(虚线)
  ctx.strokeStyle = '#0f3460'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
  state.provinces.forEach(p => {
    p.neighbors.forEach(n => {
      if (pos[p.id] && pos[n]) {
        ctx.beginPath();
        ctx.moveTo(pos[p.id].x, pos[p.id].y);
        ctx.lineTo(pos[n].x, pos[n].y);
        ctx.stroke();
      }
    });
  });
  ctx.setLineDash([]);

  // 省份圆圈
  state.provinces.forEach(p => {
    const c = pos[p.id];
    const color = TAG_COLORS[p.controller] || '#666';
    ctx.fillStyle = color + '33';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(c.x, c.y, 26, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('省' + p.id, c.x, c.y + 4);
    ctx.fillStyle = color; ctx.font = '9px sans-serif';
    ctx.fillText(p.controller, c.x, c.y - 18);
  });

  // 部队图标(按 location 定位; 移动中画箭头到目标)
  state.divisions.forEach(d => {
    const bx = pos[d.loc] ? pos[d.loc].x : 0;
    const by = pos[d.loc] ? pos[d.loc].y : 0;
    if (!pos[d.loc]) return;
    // 移动箭头(进攻红/普通绿/撤退青)
    if (d.dest && pos[d.dest]) {
      const tx = pos[d.dest].x, ty = pos[d.dest].y;
      ctx.strokeStyle = d.attacking ? '#e94560' : (d.retreating ? '#16c79a' : '#4cd964');
      ctx.lineWidth = 2; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(tx, ty); ctx.stroke();
      // 箭头头
      const ang = Math.atan2(ty - by, tx - bx);
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - 8 * Math.cos(ang - 0.4), ty - 8 * Math.sin(ang - 0.4));
      ctx.lineTo(tx - 8 * Math.cos(ang + 0.4), ty - 8 * Math.sin(ang + 0.4));
      ctx.closePath(); ctx.fill();
    }
    const color = TAG_COLORS[d.owner] || '#fff';
    ctx.fillStyle = d.annihilated ? '#444' : color;
    ctx.fillRect(bx - 6, by - 6, 12, 12);
    ctx.strokeStyle = d.id === selectedDivId ? '#ffd700' : '#fff';
    ctx.lineWidth = d.id === selectedDivId ? 2 : 1;
    ctx.strokeRect(bx - 6, by - 6, 12, 12);
    ctx.fillStyle = '#fff'; ctx.font = '8px sans-serif';
    ctx.fillText(d.owner, bx, by + 18);
  });
}

// 点击省份切换控制权(GER<->FRA, 设定包围)
document.addEventListener('click', (e) => {
  if (!canvas || !ctx) return;
  if (e.target.id !== 'mapCanvas') return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const state = getState();
  const ids = state.provinces.map(p => p.id);
  const W = canvas.clientWidth, H = canvas.clientHeight;
  for (const p of state.provinces) {
    const pos = provincePos(p.id, ids, W, H);
    if (Math.hypot(pos.x - x, pos.y - y) < 26) {
      // 选中了师 → 下移动令; 否则切换控制权
      if (selectedDivId) {
        try {
          wasm.exports.engine_move_division(selectedDivId, p.id);
          log(`师#${selectedDivId} → 省${p.id}`);
        } catch (e) {
          log('⚠️ 移动失败: ' + e.message);
        }
        selectedDivId = null;
        refresh();
        return;
      }
      const newTag = p.controller === 'GER' ? 'FRA' : 'GER';
      const tagBytes = new TextEncoder().encode(newTag);
      const ptr = wasm.exports.engine_alloc(tagBytes.length);
      new Uint8Array(wasm.exports.memory.buffer).set(tagBytes, ptr);
      wasm.exports.engine_set_province_controller(p.id, ptr, tagBytes.length);
      log(`省${p.id} 控制权 → ${newTag}`);
      refresh();
      return;
    }
  }
});

loadWasm();
</script>
</body>
</html>
